version: "3.9"

services:
  recomm_redis:
    image: redis:latest
    container_name: recomm_redis
    networks:
      - reco-network
    ports:
      - "6379:6379"
    restart: always

  ml-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml-service
    depends_on:
      - recomm_redis
    networks:
      - reco-network
    ports:
      - "8088:8088"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - REDIS_HOST=recomm_redis
      - REDIS_PORT=6379
      - DB_HOST=reco-postgres
      - DB_PORT=5432
      - DB_NAME=reco_db
      - DB_USER=reco_user
      - DB_PASSWORD=reco_pass
      - TQDM_DISABLE=True
      - TRANSFORMERS_VERBOSITY=error
    volumes:
      - ./:/app
    restart: unless-stopped

networks:
  reco-network:
    external: true
